name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy repository to app directory
        run: |
          mkdir -p /home/kawai/CS_test
          rsync -av --delete ./ /home/kawai/CS_test/

      - name: Get Falcon access token
        id: falcon_token
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_API_URL: ${{ secrets.FALCON_API_URL }}
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=${FALCON_CLIENT_ID}" \
            --data-urlencode "client_secret=${FALCON_CLIENT_SECRET}" \
            "${FALCON_API_URL}/oauth2/token" | jq -r '.access_token')
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Login to CrowdStrike registry and pull FCS CLI container
        env:
          FALCON_API_URL: ${{ secrets.FALCON_API_URL }}
          FALCON_REGION: ${{ secrets.FALCON_REGION }}
          FALCON_CID: ${{ secrets.FALCON_CID }}
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
        run: |
          # トークンをこのステップで再取得（期限切れ対策）
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=${FALCON_CLIENT_ID}" \
            --data-urlencode "client_secret=${FALCON_CLIENT_SECRET}" \
            "${FALCON_API_URL}/oauth2/token" | jq -r '.access_token')

          CS_CRED_RESP=$(curl -s \
            -H "Authorization: Bearer ${TOKEN}" \
            "${FALCON_API_URL}/iac/entities/image-registry-credentials/v1")

          echo "=== registry credential response ==="
          echo "${CS_CRED_RESP}" | jq '.resources.resources'

          CS_PASSWORD=$(echo "${CS_CRED_RESP}" | jq -r '.resources.resources.token')

          CID_NO_CHECKSUM=$(echo "${FALCON_CID}" | sed 's/-[^-]*$//' | tr '[:upper:]' '[:lower:]')
          CS_USERNAME="fh-${CID_NO_CHECKSUM}"
          echo "Using registry username: ${CS_USERNAME}"
          echo "Using region: ${FALCON_REGION}"
          echo "Password length: ${#CS_PASSWORD}"

          echo "$CS_PASSWORD" | docker login registry.crowdstrike.com \
            --username "${CS_USERNAME}" \
            --password-stdin

          CS_IMAGE="registry.crowdstrike.com/fcs/${FALCON_REGION}/release/cs-fcs"
          echo "Pulling: ${CS_IMAGE}:latest"

          # タグ一覧を確認
          curl -s -u "${CS_USERNAME}:${CS_PASSWORD}" \
            "https://registry.crowdstrike.com/v2/fcs/${FALCON_REGION}/release/cs-fcs/tags/list" \
            | jq '.' || true

          docker pull "${CS_IMAGE}:latest"
          docker tag "${CS_IMAGE}:latest" fcs:local

      - name: Build application image
        run: |
          cd /home/kawai/CS_test
          docker compose build

      - name: Run FCS image scan
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_REGION: ${{ secrets.FALCON_REGION }}
        run: |
          cd /home/kawai/CS_test

          IMAGE_NAME=$(docker compose config --format json | jq -r '.services[].image // empty' | head -1)

          if [ -z "$IMAGE_NAME" ]; then
            echo "No image name found in docker-compose.yml. Stopping."
            exit 1
          fi

          echo "Scanning image: ${IMAGE_NAME}"

          set +e
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            fcs:local scan image "${IMAGE_NAME}" \
            --client-id "${FALCON_CLIENT_ID}" \
            --client-secret "${FALCON_CLIENT_SECRET}" \
            --falcon-region "${FALCON_REGION}"
          SCAN_EXIT=$?
          set -e

          echo "FCS scan exit code: ${SCAN_EXIT}"

          # exit 1 = block (policy violation), exit 2 = alert only
          if [ "$SCAN_EXIT" -eq 1 ]; then
            echo "Image blocked by policy. Deployment stopped."
            exit 1
          elif [ "$SCAN_EXIT" -eq 2 ]; then
            echo "WARNING: Policy alert detected, but continuing deployment."
          else
            echo "Image passed policy check."
          fi

      - name: Download and install FCS CLI (for IaC scan)
        env:
          FALCON_API_URL: ${{ secrets.FALCON_API_URL }}
        run: |
          TOKEN="${{ steps.falcon_token.outputs.token }}"

          FCS_URL=$(curl -s -G \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "accept: application/json" \
            --data-urlencode 'filter=category:"fcs"+os:"linux"+arch:"amd64"' \
            "${FALCON_API_URL}/csdownloads/combined/files-download/v2" \
            | jq -r '.resources[0].download_info.download_url')

          curl -L -o /tmp/fcs.tar.gz "${FCS_URL}"
          tar -xvzf /tmp/fcs.tar.gz -C /tmp
          chmod +x /tmp/fcs
          mkdir -p "$HOME/bin"
          mv /tmp/fcs "$HOME/bin/fcs"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Run FCS IaC scan
        env:
          FALCON_FCS_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_FCS_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_FCS_FALCON_REGION: ${{ secrets.FALCON_REGION }}
        run: |
          set +e
          fcs iac scan -p /home/kawai/CS_test --upload-results
          IAC_EXIT=$?
          set -e

          echo "FCS IaC scan exit code: ${IAC_EXIT}"

          if [ "$IAC_EXIT" -eq 1 ]; then
            echo "IaC scan: critical findings detected. Deployment stopped."
            exit 1
          elif [ "$IAC_EXIT" -eq 2 ]; then
            echo "WARNING: IaC alert findings detected, continuing deployment."
          else
            echo "IaC scan passed."
          fi

      - name: Deploy with Docker Compose
        run: |
          cd /home/kawai/CS_test
          docker compose up -d
