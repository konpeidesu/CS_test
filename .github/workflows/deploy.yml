name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d "/home/ubuntu/CS_test" ]; then
              git clone https://github.com/konpeidesu/CS_test.git /home/ubuntu/CS_test
            fi
            cd /home/ubuntu/CS_test
            git pull origin main
            sudo docker compose up -d --build
