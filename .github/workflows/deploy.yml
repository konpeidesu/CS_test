name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy repository to app directory
        run: |
          mkdir -p /home/kawai/CS_test
          rsync -av --delete ./ /home/kawai/CS_test/

      - name: Deploy with Docker Compose
        run: |
          cd /home/kawai/CS_test
          docker compose up -d --build