name: Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy repository to app directory
        run: |
          mkdir -p /home/kawai/CS_test
          rsync -av --delete ./ /home/kawai/CS_test/

      - name: Download and install FCS CLI
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_API_URL: ${{ secrets.FALCON_API_URL }}
        run: |
          TOKEN=$(curl -s -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "client_id=${FALCON_CLIENT_ID}" \
            --data-urlencode "client_secret=${FALCON_CLIENT_SECRET}" \
            "${FALCON_API_URL}/oauth2/token" | jq -r '.access_token')

          FCS_URL=$(curl -s -G \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "accept: application/json" \
            --data-urlencode 'filter=category:"fcs"+os:"linux"+arch:"amd64"' \
            "${FALCON_API_URL}/csdownloads/combined/files-download/v2" \
            | jq -r '.resources[0].download_info.download_url')

          curl -L -o /tmp/fcs.tar.gz "${FCS_URL}"
          tar -xvzf /tmp/fcs.tar.gz -C /tmp
          chmod +x /tmp/fcs
          mkdir -p "$HOME/bin"
          mv /tmp/fcs "$HOME/bin/fcs"
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Build image for FCS scan
        run: |
          cd /home/kawai/CS_test
          docker compose build

      - name: Run FCS image scan
        env:
          FALCON_CLIENT_ID: ${{ secrets.FALCON_CLIENT_ID }}
          FALCON_CLIENT_SECRET: ${{ secrets.FALCON_CLIENT_SECRET }}
          FALCON_CLOUD: ${{ secrets.FALCON_CLOUD }}
        run: |
          cd /home/kawai/CS_test

          IMAGE_NAME=$(docker compose config --format json | jq -r '.services[].image // empty' | head -1)

          if [ -z "$IMAGE_NAME" ]; then
            echo "No image name found in docker-compose.yml. Stopping."
            exit 1
          fi

          fcs image scan --image "$IMAGE_NAME" --json-output > fcs-result.json

      - name: Block deploy on Critical or High findings
        run: |
          cd /home/kawai/CS_test

          echo "=== FCS scan result ==="
          cat fcs-result.json

          if jq -e '[.findings[]? | select(.severity == "critical" or .severity == "high")] | length > 0' fcs-result.json > /dev/null 2>&1; then
            echo "Critical or High findings detected. Deployment blocked."
            exit 1
          fi

          echo "No Critical or High findings detected. Continue deployment."

      - name: Deploy with Docker Compose
        run: |
          cd /home/kawai/CS_test
          docker compose up -d
