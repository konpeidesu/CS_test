<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>管理パネル</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);color:#fff;min-height:100vh;padding:20px}
.header{text-align:center;padding:15px;margin-bottom:20px;background:rgba(255,255,255,.1);border-radius:15px}
.header h1{font-size:1.5em}
.status-badge{display:inline-block;padding:5px 15px;border-radius:20px;margin-top:8px;font-size:.85em;font-weight:bold}
.status-on{background:#2ecc71;color:#000}.status-off{background:#e74c3c}
.timer-display{font-size:2.5em;font-weight:bold;margin-top:10px;font-variant-numeric:tabular-nums}
.timer-display.warning{color:#e67e22;animation:pulse 1s infinite}
.timer-display.danger{color:#e74c3c;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto}
.card{background:rgba(255,255,255,.1);border-radius:15px;padding:20px}
.card h3{margin-bottom:15px;font-size:1.1em;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.2)}
.full{grid-column:1/-1}
.btn{padding:10px 20px;border:none;border-radius:8px;font-size:1em;cursor:pointer;font-weight:bold;transition:all .3s;margin:3px}
.btn:hover{transform:scale(1.05)}
.btn-start{background:#2ecc71;color:#fff;padding:15px 30px;font-size:1.2em;width:100%}
.btn-stop{background:#e67e22;color:#fff;padding:15px 30px;font-size:1.2em;width:100%}
.btn-end{background:#e74c3c;color:#fff;padding:15px 30px;font-size:1.2em;width:100%;margin-top:8px}
.btn-result{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:15px 30px;font-size:1.2em;width:100%;margin-top:8px}
.btn-result:disabled{opacity:.4;cursor:default;transform:none}
.btn-reset{background:#555;color:#fff;width:100%;margin-top:10px}
.time-setting{margin-bottom:14px;padding:12px;background:rgba(255,255,255,.06);border-radius:8px}
.time-setting label{display:block;margin-bottom:6px;color:#ddd;font-size:.9em;font-weight:bold}
.time-setting-row{display:flex;align-items:center;gap:8px}
.time-setting input{width:110px;padding:10px;border:1px solid rgba(255,255,255,.3);border-radius:8px;background:rgba(0,0,0,.25);color:#fff;font-size:1.1em;font-weight:bold}
.time-setting input:disabled{opacity:.5}
.time-setting span{color:#ddd}
.score-table{width:100%;border-collapse:collapse}
.score-table th,.score-table td{padding:10px;text-align:left;border-bottom:1px solid rgba(255,255,255,.1)}
.score-table th{color:#aaa;font-size:.85em}
.score-val{color:#ffd700;font-weight:bold;font-size:1.1em}
.progress-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;font-size:.7em;text-align:center}
.progress-grid .ph{color:#aaa;font-weight:bold;padding:4px}
.progress-grid .q-head{line-height:1.25}
.progress-grid .q-points{display:block;color:#ffd700;font-size:.85em;font-weight:normal;margin-top:2px}
.progress-grid .pc{padding:3px;border-radius:4px}
.pc-solved{background:rgba(46,204,113,.3);color:#2ecc71}
.pc-wrong{background:rgba(231,76,60,.2);color:#e74c3c}
.pc-none{background:rgba(255,255,255,.05);color:#555}
.event-log{max-height:200px;overflow-y:auto;font-size:.85em}
.event-log div{padding:5px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.first-solver{color:#ffd700}.random-pen{color:#e74c3c}
</style>
</head>
<body>
<div class="header"><h1>🎮 クイズ大会 管理パネル</h1><div class="status-badge" id="statusBadge">⏳ 待機中</div><div class="timer-display" id="timerDisplay" style="display:none">20:00</div></div>
<div class="grid">
<div class="card"><h3>📊 スコアボード</h3><table class="score-table" id="scoreTable"><thead><tr><th>チーム</th><th>スコア</th><th>正解数</th></tr></thead><tbody></tbody></table></div>
<div class="card"><h3>🎮 コントロール</h3><div class="time-setting"><label for="timeLimitInput">制限時間設定</label><div class="time-setting-row"><input id="timeLimitInput" type="number" min="1" max="999" step="1" value="20"><span>分</span></div></div><button class="btn btn-start" id="btnStart" onclick="startGame()">▶ ゲーム開始</button><button class="btn btn-stop" id="btnStop" onclick="stopGame()" style="display:none">⏸ ゲーム一時停止</button><button class="btn btn-end" id="btnEnd" onclick="endGame()" style="display:none">⏹ ゲーム終了</button><button class="btn btn-result" id="btnResult" onclick="showResults()" disabled>🏆 結果発表</button><button class="btn btn-reset" onclick="resetGame()">🔄 リセット</button></div>
<div class="card full"><h3>📋 全チーム進捗</h3><div id="progressArea"></div></div>
<div class="card full"><h3>📝 イベントログ</h3><div class="event-log" id="eventLog"></div></div>
</div>
<script>
let ws,state=null,timerInterval=null;
function connect(){const p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${p}//${location.host}/ws/admin`);ws.onmessage=e=>{const msg=JSON.parse(e.data);
if(msg.type==='admin_state'){state=msg.data;render();}
else if(msg.type==='scores_update'&&state){state.teams=msg.data;renderScores();}
else if(msg.type==='event'&&msg.data){logEvent(msg.data);}};ws.onclose=()=>setTimeout(connect,2000);}
function render(){if(!state)return;renderScores();renderProgress();
const badge=document.getElementById('statusBadge');const btnStart=document.getElementById('btnStart');const btnStop=document.getElementById('btnStop');const btnEnd=document.getElementById('btnEnd');const btnResult=document.getElementById('btnResult');const timerEl=document.getElementById('timerDisplay');const timeLimitInput=document.getElementById('timeLimitInput');
if(state.time_limit_minutes&&document.activeElement!==timeLimitInput)timeLimitInput.value=state.time_limit_minutes;
const gs=state.game_state||'waiting';
if(gs==='running'){badge.textContent='🟢 ゲーム中';badge.className='status-badge status-on';btnStart.style.display='none';btnStop.style.display='block';btnEnd.style.display='block';btnResult.disabled=true;timeLimitInput.disabled=true;timerEl.style.display='block';startTimer(state.remaining_seconds);}
else if(gs==='ended'){badge.textContent='🔴 ゲーム終了';badge.className='status-badge status-off';btnStart.style.display='none';btnStop.style.display='none';btnEnd.style.display='none';btnResult.disabled=false;timeLimitInput.disabled=true;timerEl.style.display='block';stopTimer();updateTimerDisplay(0);}
else if(gs==='result'){badge.textContent='🏆 結果発表中';badge.className='status-badge status-on';btnStart.style.display='none';btnStop.style.display='none';btnEnd.style.display='none';btnResult.disabled=true;timeLimitInput.disabled=true;timerEl.style.display='none';stopTimer();}
else{badge.textContent='⏳ 待機中';badge.className='status-badge status-off';btnStart.style.display='block';btnStop.style.display='none';btnEnd.style.display='none';btnResult.disabled=true;timeLimitInput.disabled=false;timerEl.style.display='none';stopTimer();}}
function startTimer(remaining){stopTimer();if(remaining==null)return;
let rem=remaining;updateTimerDisplay(rem);
timerInterval=setInterval(()=>{rem-=1;if(rem<0)rem=0;updateTimerDisplay(rem);if(rem<=0){stopTimer();endGame();}},1000);}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function updateTimerDisplay(sec){const el=document.getElementById('timerDisplay');const m=Math.floor(sec/60);const s=Math.floor(sec%60);
el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
el.className='timer-display';if(sec<=60)el.classList.add('danger');else if(sec<=300)el.classList.add('warning');}
function renderScores(){if(!state)return;const tbody=document.querySelector('#scoreTable tbody');const sorted=Object.entries(state.teams).sort((a,b)=>b[1]-a[1]);
tbody.innerHTML='';sorted.forEach(([team,score])=>{const solved=Object.values(state.team_status[team]||{}).filter(s=>s.solved).length;
tbody.innerHTML+=`<tr><td>${team}</td><td class="score-val">${score.toFixed(1)}</td><td>${solved}/30</td></tr>`;});}
function renderProgress(){if(!state)return;const area=document.getElementById('progressArea');
let html='<div class="progress-grid"><div class="ph">Q#</div>';
const teams=Object.keys(state.teams);teams.forEach(t=>{html+=`<div class="ph">${t}</div>`;});
for(let i=1;i<=30;i++){const q=state.questions?.find(q=>q.id===i);const pts=q?`${q.points}点`:'';html+=`<div class="ph q-head">Q${i}<span class="q-points">${pts}</span></div>`;teams.forEach(t=>{const s=state.team_status[t]?.[String(i)];
if(!s)html+='<div class="pc pc-none">-</div>';
else if(s.solved)html+=`<div class="pc pc-solved">✅</div>`;
else if(s.wrong_count>0)html+=`<div class="pc pc-wrong">❌${s.wrong_count}</div>`;
else html+='<div class="pc pc-none">-</div>';});}
html+='</div>';area.innerHTML=html;}
function logEvent(data){const log=document.getElementById('eventLog');let html='';
if(data.bonus_msg)html+=`<div class="first-solver">⚡ ${data.bonus_msg}</div>`;
if(data.penalty_msg)html+=`<div class="random-pen">🎲 ${data.penalty_msg}</div>`;
if(data.message)html+=`<div>${data.message}</div>`;
log.innerHTML=html+log.innerHTML;}
function startGame(){const input=document.getElementById('timeLimitInput');const minutes=Math.max(1,Math.min(parseInt(input.value,10)||20,999));input.value=minutes;ws.send(JSON.stringify({type:'start_game',time_limit_minutes:minutes}));}
function stopGame(){ws.send(JSON.stringify({type:'stop_game'}));}
function endGame(){ws.send(JSON.stringify({type:'end_game'}));}
function showResults(){ws.send(JSON.stringify({type:'show_results'}));}
function resetGame(){if(confirm('ゲームをリセットしますか？'))ws.send(JSON.stringify({type:'reset'}));}
connect();
</script>
</body>
</html>
