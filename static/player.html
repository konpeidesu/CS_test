<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>クイズ大会</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
.header{background:rgba(0,0,0,.3);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:1.1em}.team-info{display:flex;align-items:center;gap:12px}
.team-badge{background:rgba(255,255,255,.15);padding:5px 15px;border-radius:20px;font-size:.9em}
.score-display{color:#ffd700;font-weight:bold;font-size:1.8em;text-shadow:0 0 10px rgba(255,215,0,.5)}
.container{max-width:900px;margin:0 auto;padding:20px}
.screen{display:none}.screen.active{display:block}
.team-select-title{text-align:center;font-size:1.8em;margin:40px 0 30px;font-weight:bold}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;max-width:400px;margin:0 auto}
.team-btn{padding:22px;font-size:1.3em;border:none;border-radius:15px;cursor:pointer;font-weight:bold;color:#fff;transition:all .3s}
.team-btn:hover{transform:scale(1.05);filter:brightness(1.2)}
.team-btn:nth-child(1){background:linear-gradient(135deg,#f093fb,#f5576c)}
.team-btn:nth-child(2){background:linear-gradient(135deg,#4facfe,#00f2fe)}
.team-btn:nth-child(3){background:linear-gradient(135deg,#43e97b,#38f9d7)}
.team-btn:nth-child(4){background:linear-gradient(135deg,#fa709a,#fee140)}
.team-btn:nth-child(5){background:linear-gradient(135deg,#a18cd1,#fbc2eb)}
.team-btn:nth-child(6){background:linear-gradient(135deg,#fccb90,#d57eeb)}
.confirm-box{text-align:center;margin-top:60px}
.confirm-box h2{font-size:1.5em;margin-bottom:20px}
.confirm-team{font-size:2.5em;font-weight:bold;margin:20px 0;padding:20px;background:rgba(255,255,255,.1);border-radius:15px;display:inline-block}
.confirm-btns{display:flex;gap:15px;justify-content:center;margin-top:30px}
.btn{padding:14px 35px;border:none;border-radius:12px;font-size:1.1em;cursor:pointer;font-weight:bold;transition:all .3s}
.btn:hover{transform:scale(1.05)}
.btn-primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
.btn-secondary{background:rgba(255,255,255,.2);color:#fff}
.score-bar-top{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;padding:15px;background:rgba(0,0,0,.3);border-radius:15px}
.score-bar-top .sb-item{display:flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(255,255,255,.08);border-radius:20px;font-size:.9em}
.score-bar-top .sb-item.my-team{background:rgba(255,215,0,.15);border:1px solid #ffd700}
.score-bar-top .sb-name{font-weight:bold}
.score-bar-top .sb-val{color:#ffd700;font-weight:bold}
.score-bar-top .sb-dot{width:10px;height:10px;border-radius:50%}
.section-header{margin:20px 0 10px;padding:8px 16px;border-radius:10px;font-size:1.1em;font-weight:bold;text-align:center}
.section-2pt{background:linear-gradient(135deg,rgba(79,172,254,.3),rgba(0,242,254,.2));border:1px solid #4facfe}
.section-3pt{background:linear-gradient(135deg,rgba(67,233,123,.3),rgba(56,249,215,.2));border:1px solid #43e97b}
.section-4pt{background:linear-gradient(135deg,rgba(245,87,108,.3),rgba(240,147,251,.2));border:1px solid #f5576c}
.q-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:10px}
@media(max-width:600px){.q-grid{grid-template-columns:repeat(2,1fr)}}
.q-card{border-radius:12px;padding:15px;cursor:pointer;transition:all .3s;text-align:center}
.q-card:hover{transform:translateY(-3px);filter:brightness(1.2)}
.q-card.solved{opacity:.7}
.q-card.pts-2{background:rgba(79,172,254,.15);border:2px solid rgba(79,172,254,.4)}
.q-card.pts-2.solved{border-color:#2ecc71;background:rgba(46,204,113,.15)}
.q-card.pts-3{background:rgba(67,233,123,.15);border:2px solid rgba(67,233,123,.4)}
.q-card.pts-3.solved{border-color:#2ecc71;background:rgba(46,204,113,.15)}
.q-card.pts-4{background:rgba(245,87,108,.15);border:2px solid rgba(245,87,108,.4)}
.q-card.pts-4.solved{border-color:#2ecc71;background:rgba(46,204,113,.15)}
.q-card .q-num{font-size:.8em;color:#aaa}.q-card .q-title{font-size:1em;font-weight:bold;margin:6px 0}
.q-card .q-pts{font-size:.85em;color:#ffd700}
.q-card .q-status{font-size:.75em;margin-top:6px;padding:3px 8px;border-radius:10px;display:inline-block}
.status-unsolved{background:rgba(255,255,255,.1);color:#aaa}
.status-solved{background:rgba(46,204,113,.3);color:#2ecc71}
.status-hint{background:rgba(241,196,15,.3);color:#f1c40f}
.status-wrong{background:rgba(231,76,60,.3);color:#e74c3c}
.detail-back{display:inline-flex;align-items:center;gap:5px;color:#aaa;cursor:pointer;margin-bottom:20px;font-size:.95em}
.detail-back:hover{color:#fff}
.detail-card{background:rgba(255,255,255,.08);border-radius:15px;padding:25px}
.d-num{color:#aaa;font-size:.9em}.d-title{font-size:1.5em;font-weight:bold;margin:8px 0}
.d-pts{color:#ffd700;margin-bottom:20px}
.d-question{font-size:1.2em;line-height:1.6;margin-bottom:25px;padding:20px;background:rgba(255,255,255,.05);border-radius:10px}
.hint-area{margin-bottom:20px}
.hint-btn{background:rgba(241,196,15,.2);border:1px solid #f1c40f;color:#f1c40f;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:.95em}
.hint-text{margin-top:10px;padding:12px 18px;background:rgba(241,196,15,.1);border-left:3px solid #f1c40f;border-radius:0 8px 8px 0;color:#f1c40f}
.answer-area{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:16px 20px;border-radius:12px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:1.1em;cursor:pointer;transition:all .3s;text-align:left;font-weight:500}
.choice-btn:hover{border-color:rgba(102,126,234,.6);background:rgba(102,126,234,.15);transform:translateX(5px)}
.choice-btn:disabled{opacity:.5;cursor:default;transform:none}
.choice-btn.selected{border-color:#667eea;background:rgba(102,126,234,.2)}
.result-msg{margin-top:15px;padding:12px 18px;border-radius:10px;font-weight:bold;text-align:center}
.result-msg.correct{background:rgba(46,204,113,.2);color:#2ecc71;border:1px solid #2ecc71}
.result-msg.wrong{background:rgba(231,76,60,.2);color:#e74c3c;border:1px solid #e74c3c}
.solved-badge{text-align:center;padding:20px;background:rgba(46,204,113,.15);border-radius:10px;color:#2ecc71;font-size:1.3em;font-weight:bold}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);padding:12px 25px;border-radius:10px;z-index:200;display:none;text-align:center;border:1px solid #ffd700;max-width:90%}
.toast.show{display:block;animation:fadeInOut 4s}
@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.waiting-box{text-align:center;margin-top:80px}
.waiting-box .emoji{font-size:4em;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.waiting-box h2{font-size:1.8em;margin:20px 0}.waiting-box p{color:#aaa;font-size:1.1em}
</style>
</head>
<body>
<div class="header"><h1>🎯 社内クイズ大会</h1><div class="team-info" id="teamInfo" style="display:none"><span class="team-badge" id="headerTeam"></span><span class="score-display" id="headerScore">0 pt</span></div></div>
<div class="container">
<div class="screen active" id="screenSelect"><div class="team-select-title">チームを選択してください</div><div class="team-grid" id="teamGrid"></div></div>
<div class="screen" id="screenConfirm"><div class="confirm-box"><h2>このチームで参加しますか？</h2><div class="confirm-team" id="confirmTeamName"></div><div class="confirm-btns"><button class="btn btn-secondary" onclick="backToSelect()">← 戻る</button><button class="btn btn-primary" onclick="confirmTeam()">参加する →</button></div></div></div>
<div class="screen" id="screenWaiting"><div class="waiting-box"><div class="emoji">⏳</div><h2>ゲーム開始をお待ちください</h2><p>管理者がゲームを開始します</p></div></div>
<div class="screen" id="screenList"><div class="score-bar-top" id="scoreBarTop"></div><div id="qListArea"></div></div>
<div class="screen" id="screenDetail"><div class="detail-back" onclick="backToList()">← 問題一覧に戻る</div><div class="detail-card" id="detailCard"></div></div>
</div>
<div class="toast" id="toast"></div>
<script>
const TEAMS=["A-1","A-2","B-1","B-2","C-1","C-2"];
const teamColors=['#f5576c','#4facfe','#43e97b','#fee140','#a18cd1','#fccb90'];
let ws,myTeam=null,gameState=null,currentQid=null,allScores={};
function connect(){const p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${p}//${location.host}/ws/player`);ws.onmessage=handleMessage;ws.onclose=()=>setTimeout(connect,2000);}
function handleMessage(e){const msg=JSON.parse(e.data);
if(msg.type==='team_state'){gameState=msg.data;renderList();updateHeader();if(gameState.game_started&&document.getElementById('screenWaiting').classList.contains('active'))showScreen('screenList');}
else if(msg.type==='question_detail')renderDetail(msg.data);
else if(msg.type==='answer_result')showAnswerResult(msg.data);
else if(msg.type==='hint_result')showHint(msg.data);
else if(msg.type==='scores_update'){allScores=msg.data;if(gameState&&myTeam){gameState.score=msg.data[myTeam]||0;updateHeader();renderScoreBar();}}
else if(msg.type==='game_started'){if(myTeam){requestState();showScreen('screenList');}}
else if(msg.type==='game_reset'){myTeam=null;gameState=null;allScores={};showScreen('screenSelect');document.getElementById('teamInfo').style.display='none';}
else if(msg.type==='event'&&msg.data){const parts=[msg.data.bonus_msg,msg.data.penalty_msg,msg.data.message].filter(Boolean);if(parts.length)showToast(parts.join(' / '));}}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function updateHeader(){if(!gameState)return;document.getElementById('headerScore').textContent=gameState.score.toFixed(1)+' pt';}
function requestState(){if(ws&&myTeam)ws.send(JSON.stringify({type:'get_state',team:myTeam}));}
const grid=document.getElementById('teamGrid');
TEAMS.forEach(t=>{const b=document.createElement('button');b.className='team-btn';b.textContent=t;b.onclick=()=>selectTeam(t);grid.appendChild(b);});
function selectTeam(t){myTeam=t;document.getElementById('confirmTeamName').textContent=t;showScreen('screenConfirm');}
function backToSelect(){myTeam=null;showScreen('screenSelect');}
function confirmTeam(){document.getElementById('teamInfo').style.display='flex';document.getElementById('headerTeam').textContent='👥 '+myTeam;requestState();showScreen('screenWaiting');}
function renderScoreBar(){const bar=document.getElementById('scoreBarTop');if(!bar||!gameState)return;
const myScore=gameState.score||0;const ci=TEAMS.indexOf(myTeam);const color=teamColors[ci]||'#fff';
bar.innerHTML=`<div class="sb-item my-team"><span class="sb-dot" style="background:${color}"></span><span class="sb-name">${myTeam}</span><span class="sb-val">${myScore.toFixed(1)}pt</span></div>`;}
function renderList(){if(!gameState)return;
if(Object.keys(allScores).length===0&&gameState.score!==undefined){allScores[myTeam]=gameState.score;}
renderScoreBar();
const area=document.getElementById('qListArea');area.innerHTML='';
const groups=[{pts:2,label:'⭐⭐ 2点問題（基本）',cls:'section-2pt'},{pts:3,label:'⭐⭐⭐ 3点問題（応用）',cls:'section-3pt'},{pts:4,label:'⭐⭐⭐⭐ 4点問題（難問）',cls:'section-4pt'}];
groups.forEach(g=>{const qs=gameState.questions.filter(q=>q.points===g.pts);if(!qs.length)return;
const sh=document.createElement('div');sh.className='section-header '+g.cls;sh.textContent=g.label;area.appendChild(sh);
const gridDiv=document.createElement('div');gridDiv.className='q-grid';
qs.forEach(q=>{const card=document.createElement('div');card.className='q-card pts-'+q.points+(q.solved?' solved':'');
let st='未回答',sc='status-unsolved';
if(q.solved){st='✅ 正解済み';sc='status-solved';}
else if(q.wrong_count>0&&q.hint_used){st=`❌×${q.wrong_count} 💡済`;sc='status-wrong';}
else if(q.wrong_count>0){st=`❌×${q.wrong_count}`;sc='status-wrong';}
else if(q.hint_used){st='💡 ヒント済';sc='status-hint';}
card.innerHTML=`<div class="q-num">Q${q.id}</div><div class="q-title">${q.title}</div><div class="q-pts">⭐ ${q.points}点</div><div class="q-status ${sc}">${st}</div>`;
card.onclick=()=>openQuestion(q.id);gridDiv.appendChild(card);});
area.appendChild(gridDiv);});}
function openQuestion(qid){currentQid=qid;ws.send(JSON.stringify({type:'get_question',team:myTeam,question_id:qid}));showScreen('screenDetail');}
function backToList(){requestState();showScreen('screenList');}
function renderDetail(q){if(!q)return;const card=document.getElementById('detailCard');
if(q.solved){card.innerHTML=`<div class="d-num">Q${q.id}</div><div class="d-title">${q.title}</div><div class="d-pts">⭐ ${q.points}点</div><div class="d-question">${q.question}</div><div class="solved-badge">✅ 正解済み</div>`;return;}
let hh='';if(q.has_hint){const label=q.hint_used?'💡 ヒントを見る (表示済み)':'💡 ヒントを見る (-1点)';hh=`<div class="hint-area"><button class="hint-btn" id="hintBtn" onclick="useHint(${q.id})">${label}</button><div class="hint-text" id="hintText" style="display:none"></div></div>`;}
let choicesHtml='';if(q.choices&&q.choices.length){choicesHtml='<div class="answer-area" id="choicesArea"></div>';}
card.innerHTML=`<div class="d-num">Q${q.id}</div><div class="d-title">${q.title}</div><div class="d-pts">⭐ ${q.points}点</div><div class="d-question">${q.question}</div>${hh}${choicesHtml}<div id="resultArea"></div>`;
if(q.choices&&q.choices.length){const ca=document.getElementById('choicesArea');q.choices.forEach(c=>{const btn=document.createElement('button');btn.className='choice-btn';btn.textContent=c;btn.onclick=function(){submitChoice(q.id,btn,c);};ca.appendChild(btn);});}
if(q.wrong_count>0)document.getElementById('resultArea').innerHTML=`<div class="result-msg wrong">誤答 ${q.wrong_count}回</div>`;}
function submitChoice(qid,btn,answer){const btns=document.querySelectorAll('.choice-btn');btns.forEach(b=>b.disabled=true);btn.classList.add('selected');ws.send(JSON.stringify({type:'answer',team:myTeam,question_id:qid,answer:answer}));}
function submitAnswer(qid){const inp=document.getElementById('answerInput');if(!inp||!inp.value.trim())return;document.getElementById('submitBtn').disabled=true;ws.send(JSON.stringify({type:'answer',team:myTeam,question_id:qid,answer:inp.value.trim()}));}
function showAnswerResult(data){const area=document.getElementById('resultArea');if(!area)return;
if(data.correct){area.innerHTML=`<div class="result-msg correct">🎉 ${data.message} (+${data.points_earned}点)</div>`;setTimeout(()=>{requestState();showScreen('screenList');},2000);}
else{area.innerHTML=`<div class="result-msg wrong">${data.message}</div>`;const btns=document.querySelectorAll('.choice-btn');btns.forEach(b=>{b.disabled=false;b.classList.remove('selected');});}}
function useHint(qid){ws.send(JSON.stringify({type:'use_hint',team:myTeam,question_id:qid}));}
function showHint(data){if(!data.success)return;const ht=document.getElementById('hintText'),hb=document.getElementById('hintBtn');if(ht){ht.textContent='💡 '+data.hint;ht.style.display='block';}if(hb){hb.textContent='💡 ヒント表示済み';hb.onclick=null;}if(!data.already_used)showToast(data.message);}
function showToast(msg){if(!msg)return;const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),4000);}
connect();
</script>
</body>
</html>
