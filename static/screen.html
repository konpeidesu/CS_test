<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>クイズ大会 - スクリーン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(0,0,0,.3)}
.header h1{font-size:2em}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.score-bar{display:flex;gap:15px;padding:15px 40px;background:rgba(0,0,0,.3);flex-wrap:wrap;justify-content:center}
.score-item{display:flex;align-items:center;gap:10px;padding:10px 25px;background:rgba(255,255,255,.1);border-radius:25px;font-size:1.2em;min-width:140px;justify-content:center}
.score-item .sname{font-weight:bold}.score-item .sval{color:#ffd700;font-weight:bold}
.score-item .dot{width:14px;height:14px;border-radius:50%}
.board{width:100%;max-width:1100px}
.board-title{text-align:center;font-size:2em;margin-bottom:30px;font-weight:bold}
.board-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.b-card{background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);border-radius:12px;padding:15px;text-align:center;transition:all .5s}
.b-card.all-solved{border-color:#2ecc71;background:rgba(46,204,113,.15)}
.b-card .b-num{font-size:.85em;color:#aaa}.b-card .b-title{font-size:1.1em;font-weight:bold;margin:5px 0}
.b-card .b-pts{color:#ffd700;font-size:.9em}.b-card .b-first{color:#ffd700;font-size:.8em;margin-top:5px}
.b-card .b-solvers{font-size:.75em;color:#2ecc71;margin-top:3px}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);padding:15px 35px;border-radius:12px;z-index:200;display:none;text-align:center;border:2px solid #ffd700;font-size:1.3em;max-width:80%}
.toast.show{display:block;animation:fadeInOut 5s}
@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.waiting{text-align:center}.waiting .emoji{font-size:5em;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.waiting h2{font-size:2.5em;margin:20px 0}.waiting p{color:#aaa;font-size:1.3em}
</style>
</head>
<body>
<div class="header"><h1>🎯 社内クイズ大会</h1></div>
<div class="main">
<div class="waiting" id="waitingScreen"><div class="emoji">🎮</div><h2>クイズ大会</h2><p>まもなく開始します...</p></div>
<div class="board" id="boardScreen" style="display:none"><div class="board-title">📋 問題ボード</div><div class="board-grid" id="boardGrid"></div></div>
</div>
<div class="score-bar" id="scoreBar"></div>
<div class="toast" id="toast"></div>
<script>
const TEAMS=["A-1","A-2","B-1","B-2","C-1","C-2"];
const teamColors=['#f5576c','#4facfe','#43e97b','#fee140','#a18cd1','#fccb90'];
let ws,adminState=null;
function connect(){const p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${p}//${location.host}/ws/admin`);
ws.onmessage=e=>{const msg=JSON.parse(e.data);
if(msg.type==='admin_state'){adminState=msg.data;render();}
else if(msg.type==='scores_update'&&adminState){adminState.teams=msg.data;renderScoreBar();}
else if(msg.type==='event'&&msg.data){const parts=[msg.data.bonus_msg,msg.data.penalty_msg,msg.data.message].filter(Boolean);if(parts.length)showToast(parts.join(' / '));}};
ws.onclose=()=>setTimeout(connect,2000);}
function render(){if(!adminState)return;
if(adminState.game_started){document.getElementById('waitingScreen').style.display='none';document.getElementById('boardScreen').style.display='block';renderBoard();}
else{document.getElementById('waitingScreen').style.display='block';document.getElementById('boardScreen').style.display='none';}
renderScoreBar();}
function renderScoreBar(){if(!adminState)return;const bar=document.getElementById('scoreBar');
const sorted=Object.entries(adminState.teams).sort((a,b)=>b[1]-a[1]);bar.innerHTML='';
sorted.forEach(([team,score],i)=>{const ci=TEAMS.indexOf(team);const color=teamColors[ci]||'#fff';
bar.innerHTML+=`<div class="score-item"><span class="dot" style="background:${color}"></span><span class="sname">${team}</span><span class="sval">${score.toFixed(1)}pt</span></div>`;});}
function renderBoard(){if(!adminState)return;const grid=document.getElementById('boardGrid');grid.innerHTML='';
adminState.questions.forEach(q=>{const card=document.createElement('div');
const solvers=[];TEAMS.forEach(t=>{const s=adminState.team_status[t]?.[String(q.id)];if(s&&s.solved)solvers.push(t);});
card.className='b-card'+(solvers.length===6?' all-solved':'');
const first=adminState.first_solver[String(q.id)];
let firstHtml=first?`<div class="b-first">⚡ ${first}</div>`:'';
let solversHtml=solvers.length?`<div class="b-solvers">${solvers.join(', ')}</div>`:'';
card.innerHTML=`<div class="b-num">Q${q.id}</div><div class="b-title">${q.title}</div><div class="b-pts">⭐ ${q.points}点</div>${firstHtml}${solversHtml}`;
grid.appendChild(card);});}
function showToast(msg){if(!msg)return;const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);}
connect();
</script>
</body>
</html>
