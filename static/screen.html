<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>クイズ大会 - スクリーン</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:rgba(0,0,0,.3)}
.header h1{font-size:2em}
.header .timer{font-size:1.8em;font-weight:bold;font-variant-numeric:tabular-nums;color:#ffd700}
.header .timer.warning{color:#e67e22}.header .timer.danger{color:#e74c3c;animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.waiting{text-align:center}.waiting .emoji{font-size:6em;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.waiting h2{font-size:3em;margin:20px 0}.waiting p{color:#aaa;font-size:1.5em}
.score-main{width:100%;max-width:1200px}
.score-title{text-align:center;font-size:2.5em;margin-bottom:40px;font-weight:bold}
.score-cards{display:flex;flex-direction:column;gap:20px}
.score-row{display:flex;align-items:center;gap:20px;padding:20px 30px;border-radius:20px;background:rgba(255,255,255,.06);transition:all .6s ease;position:relative;overflow:hidden}
.score-row.rank-1{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(255,215,0,.05));border:2px solid rgba(255,215,0,.3);transform:scale(1.03)}
.score-row.rank-2{background:linear-gradient(135deg,rgba(192,192,192,.12),rgba(192,192,192,.04));border:2px solid rgba(192,192,192,.2)}
.score-row.rank-3{background:linear-gradient(135deg,rgba(205,127,50,.12),rgba(205,127,50,.04));border:2px solid rgba(205,127,50,.2)}
.score-rank{font-size:2.5em;width:60px;text-align:center}
.score-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0}
.score-name{font-size:2em;font-weight:bold;flex:0 0 120px}
.score-bar-wrap{flex:1;height:40px;background:rgba(255,255,255,.08);border-radius:20px;overflow:hidden;position:relative}
.score-bar-fill{height:100%;border-radius:20px;transition:width 1s ease;min-width:5px}
.score-val{font-size:2.2em;font-weight:bold;color:#ffd700;min-width:120px;text-align:right;text-shadow:0 0 15px rgba(255,215,0,.4)}
.score-solved{font-size:1em;color:#aaa;min-width:60px;text-align:right}
.score-hidden .score-val,.score-hidden .score-bar-fill,.score-hidden .score-solved,.score-hidden .score-rank,.score-hidden .score-name,.score-hidden .score-dot{visibility:hidden}
.last-min-overlay{text-align:center;font-size:2.4em;font-weight:bold;color:#ff5a36;animation:pulseGlow 1.2s infinite;margin-bottom:22px}
.urgent-countdown{display:none;position:fixed;inset:0;z-index:150;align-items:center;justify-content:center;pointer-events:none;background:radial-gradient(circle,rgba(231,76,60,.22),rgba(0,0,0,.38) 55%,rgba(0,0,0,.62));}
.urgent-countdown.active{display:flex}
.urgent-countdown-inner{padding:32px 56px;border:4px solid rgba(255,90,54,.85);border-radius:20px;background:rgba(0,0,0,.78);color:#ff3b20;font-size:7em;font-weight:900;font-variant-numeric:tabular-nums;text-shadow:0 0 25px rgba(255,59,32,.9);box-shadow:0 0 60px rgba(231,76,60,.55);animation:urgentPulse .8s infinite}
@keyframes pulseGlow{0%,100%{text-shadow:0 0 10px rgba(255,90,54,.35)}50%{text-shadow:0 0 32px rgba(255,90,54,.9)}}
@keyframes urgentPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.result-mode .score-title{font-size:3em;animation:resultIn 1s ease}
@keyframes resultIn{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
.result-reveal{animation:revealRow .8s ease both}
@keyframes revealRow{0%{opacity:0;transform:translateX(100px)}100%{opacity:1;transform:translateX(0)}}
/* Score change animation */
.score-delta{position:absolute;right:200px;font-size:1.5em;font-weight:bold;opacity:0;pointer-events:none}
.score-delta.show-plus{color:#2ecc71;animation:floatUp 2s forwards}
.score-delta.show-minus{color:#e74c3c;animation:floatUp 2s forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}50%{opacity:1}100%{opacity:0;transform:translateY(-60px)}}
/* Flash effect on score change */
.score-row.flash-plus{animation:glowGreen .8s}
.score-row.flash-minus{animation:glowRed .8s}
@keyframes glowGreen{0%{box-shadow:0 0 0 rgba(46,204,113,0)}30%{box-shadow:0 0 30px rgba(46,204,113,.5)}100%{box-shadow:0 0 0 rgba(46,204,113,0)}}
@keyframes glowRed{0%{box-shadow:0 0 0 rgba(231,76,60,0)}30%{box-shadow:0 0 30px rgba(231,76,60,.5)}100%{box-shadow:0 0 0 rgba(231,76,60,0)}}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);padding:15px 35px;border-radius:12px;z-index:200;display:none;text-align:center;border:2px solid #ffd700;font-size:1.5em;max-width:80%}
.toast.show{display:block;animation:fadeInOut 5s}
@keyframes fadeInOut{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="header"><h1>🎯 社内クイズ大会</h1><div class="timer" id="headerTimer" style="display:none">20:00</div></div>
<div class="main">
<div class="waiting" id="waitingScreen"><div class="emoji">🎮</div><h2>クイズ大会</h2><p>まもなく開始します...</p></div>
<div class="score-main" id="scoreScreen" style="display:none"><div id="lastMinOverlay" class="last-min-overlay" style="display:none"></div><div class="score-title" id="scoreTitle">🏆 スコアボード</div><div class="score-cards" id="scoreCards"></div></div>
</div>
<div class="urgent-countdown" id="urgentCountdown"><div class="urgent-countdown-inner" id="urgentCountdownText">02:59</div></div>
<div class="toast" id="toast"></div>
<script>
const TEAMS=["A-1","A-2","B-1","B-2","C-1","C-2"];
const teamColors=['#f5576c','#4facfe','#43e97b','#fee140','#a18cd1','#fccb90'];
const barColors=['linear-gradient(90deg,#f5576c,#f093fb)','linear-gradient(90deg,#4facfe,#00f2fe)','linear-gradient(90deg,#43e97b,#38f9d7)','linear-gradient(90deg,#fa709a,#fee140)','linear-gradient(90deg,#a18cd1,#fbc2eb)','linear-gradient(90deg,#fccb90,#d57eeb)'];
let ws,adminState=null,prevScores={},timerInterval=null,isLastMinute=false,currentGameState='waiting';
const HIDE_SCORE_THRESHOLD_SECONDS=180;
function connect(){const p=location.protocol==='https:'?'wss:':'ws:';ws=new WebSocket(`${p}//${location.host}/ws/admin`);
ws.onmessage=e=>{const msg=JSON.parse(e.data);
if(msg.type==='admin_state'){adminState=msg.data;render();}
else if(msg.type==='scores_update'&&adminState){const oldScores={...adminState.teams};adminState.teams=msg.data;renderScores(oldScores);}
else if(msg.type==='event'&&msg.data){const parts=[msg.data.bonus_msg,msg.data.penalty_msg,msg.data.message].filter(Boolean);if(parts.length)showToast(parts.join(' / '));}};
ws.onclose=()=>setTimeout(connect,2000);}
function hideUrgentCountdown(){document.getElementById('urgentCountdown').classList.remove('active');}
function render(){if(!adminState)return;
const gs=adminState.game_state||'waiting';currentGameState=gs;
if(gs==='running'){document.getElementById('waitingScreen').style.display='none';document.getElementById('scoreScreen').style.display='block';document.getElementById('scoreScreen').classList.remove('result-mode');document.getElementById('scoreTitle').textContent='🏆 スコアボード';startTimer(adminState.remaining_seconds);renderScores();}
else if(gs==='ended'){document.getElementById('waitingScreen').style.display='none';document.getElementById('scoreScreen').style.display='block';document.getElementById('scoreScreen').classList.remove('result-mode');document.getElementById('scoreTitle').textContent='⏰ ゲーム終了 - 結果発表をお待ちください';hideUrgentCountdown();stopTimer();isLastMinute=true;renderScores();}
else if(gs==='result'){document.getElementById('waitingScreen').style.display='none';document.getElementById('scoreScreen').style.display='block';document.getElementById('lastMinOverlay').style.display='none';document.getElementById('scoreScreen').classList.add('result-mode');document.getElementById('scoreTitle').textContent='🏆🎉 最終結果発表 🎉🏆';hideUrgentCountdown();stopTimer();isLastMinute=false;renderResultScores();}
else{document.getElementById('waitingScreen').style.display='block';document.getElementById('scoreScreen').style.display='none';document.getElementById('lastMinOverlay').style.display='none';hideUrgentCountdown();stopTimer();isLastMinute=false;}}
function startTimer(remaining){stopTimer();if(remaining==null)return;
const timerEl=document.getElementById('headerTimer');timerEl.style.display='block';
let rem=remaining;updateTimer(rem);
if(rem<HIDE_SCORE_THRESHOLD_SECONDS){isLastMinute=true;document.getElementById('lastMinOverlay').style.display='block';}
timerInterval=setInterval(()=>{rem-=1;if(rem<0)rem=0;updateTimer(rem);
if(rem<HIDE_SCORE_THRESHOLD_SECONDS&&!isLastMinute){isLastMinute=true;document.getElementById('lastMinOverlay').style.display='block';renderScores();}
if(rem<=0)stopTimer();},1000);}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null;}}
function updateTimer(sec){const el=document.getElementById('headerTimer');const m=Math.floor(sec/60);const s=Math.floor(sec%60);
el.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
el.className='timer';if(sec<HIDE_SCORE_THRESHOLD_SECONDS)el.classList.add('danger');else if(sec<=300)el.classList.add('warning');
const urgent=document.getElementById('urgentCountdown');const urgentText=document.getElementById('urgentCountdownText');
if(sec<HIDE_SCORE_THRESHOLD_SECONDS&&currentGameState==='running'){urgent.classList.add('active');urgentText.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}else{urgent.classList.remove('active');}}
function renderScores(oldScores){if(!adminState)return;const container=document.getElementById('scoreCards');
const hideScores=isLastMinute||currentGameState==='ended';
const sorted=hideScores?TEAMS.map(t=>[t,adminState.teams[t]||0]):Object.entries(adminState.teams).sort((a,b)=>b[1]-a[1]);
const maxScore=Math.max(...Object.values(adminState.teams),1);
const rankEmoji=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
container.innerHTML='';
sorted.forEach(([team,score],i)=>{const ci=TEAMS.indexOf(team);const color=teamColors[ci]||'#fff';const bg=barColors[ci]||'linear-gradient(90deg,#fff,#aaa)';
const pct=Math.max((score/maxScore)*100,2);
const solved=Object.values(adminState.team_status[team]||{}).filter(s=>s.solved).length;
const row=document.createElement('div');
row.className='score-row'+(!hideScores&&i<3?` rank-${i+1}`:'')+(hideScores?' score-hidden':'');
row.id='row-'+team;
let deltaHtml='';
if(!hideScores&&oldScores&&oldScores[team]!==undefined){const diff=score-oldScores[team];
if(Math.abs(diff)>0.01){const cls=diff>0?'show-plus':'show-minus';const sign=diff>0?'+':'';
deltaHtml=`<div class="score-delta ${cls}">${sign}${diff.toFixed(1)}</div>`;
setTimeout(()=>{row.classList.add(diff>0?'flash-plus':'flash-minus');setTimeout(()=>row.classList.remove('flash-plus','flash-minus'),800);},50);}}
const displayScore=hideScores?'???':''+score.toFixed(1);
const displaySolved=hideScores?'?/30':''+solved+'/30';
const displayRank=hideScores?'???':rankEmoji[i];
const displayTeam=hideScores?'TEAM ?':team;
row.innerHTML=`<div class="score-rank">${displayRank}</div><div class="score-dot" style="background:${color}"></div><div class="score-name">${displayTeam}</div><div class="score-bar-wrap"><div class="score-bar-fill" style="width:${hideScores?50:pct}%;background:${bg}"></div></div><div class="score-val">${displayScore}<small style="font-size:.5em">${hideScores?'':'pt'}</small></div><div class="score-solved">${displaySolved}</div>${deltaHtml}`;
container.appendChild(row);});
prevScores={...adminState.teams};}
function renderResultScores(){if(!adminState)return;const container=document.getElementById('scoreCards');
const sorted=Object.entries(adminState.teams).sort((a,b)=>b[1]-a[1]);
const maxScore=Math.max(...sorted.map(s=>s[1]),1);
const rankEmoji=['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣'];
container.innerHTML='';
sorted.forEach(([team,score],i)=>{const ci=TEAMS.indexOf(team);const color=teamColors[ci]||'#fff';const bg=barColors[ci]||'linear-gradient(90deg,#fff,#aaa)';
const pct=Math.max((score/maxScore)*100,2);
const solved=Object.values(adminState.team_status[team]||{}).filter(s=>s.solved).length;
const row=document.createElement('div');
const revealIdx=sorted.length-1-i;
row.className='score-row'+(i<3?` rank-${i+1}`:'')+' result-reveal';
row.style.animationDelay=(revealIdx*0.5)+'s';
row.innerHTML=`<div class="score-rank">${rankEmoji[i]}</div><div class="score-dot" style="background:${color}"></div><div class="score-name">${team}</div><div class="score-bar-wrap"><div class="score-bar-fill" style="width:${pct}%;background:${bg}"></div></div><div class="score-val">${score.toFixed(1)}<small style="font-size:.5em">pt</small></div><div class="score-solved">${solved}/30</div>`;
container.appendChild(row);});}
function showToast(msg){if(!msg)return;const t=document.getElementById('toast');t.textContent=msg;t.classList.remove('show');void t.offsetWidth;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),5000);}
connect();
</script>
</body>
</html>
